# ─────────────────────────────────────────────
# Cross-Domain Agents
# ─────────────────────────────────────────────

cross_domain_agents:
  - id: ux-design-expert
    primary_domain: software-dev
    available_in: [marketing, brand]
    routing_keywords:
      - design
      - landing page layout
      - banner design
      - visual guidelines
      - UI components
      - design system
      - brand visual
      - logo brief
      - CIP brief
      - palette
      - wireframe
    rationale: "Sati's Phase 6 commands (*banner, *landing, *pitch-deck, *cip-brief, *logo-brief, *brand-audit) serve marketing and brand needs"

  - id: traffic-manager
    primary_domain: business
    available_in: [marketing]
    routing_keywords:
      - campaign execution
      - budget allocation
      - paid media
      - campaign plan
      - ROI report
    rationale: "Merovingian migrado para business domain — budget e performance são decisões de negócio. Disponível em marketing para Campaign Pipeline cross-domain."

  - id: copywriter
    primary_domain: marketing
    available_in: [brand, business]
    routing_keywords:
      - brand copy
      - tagline
      - ad copy
      - offer copy
      - sales letter
      - landing page copy
    rationale: "Mouse escreve copy para qualquer domínio — brand copy, ad copy, offer copy."

  - id: seo
    primary_domain: marketing
    available_in: [brand, software-dev]
    routing_keywords:
      - brand SEO
      - technical SEO
      - site audit
      - schema markup
    rationale: "Cypher otimiza SEO para sites de marca (brand) e audita SEO técnico (software-dev)."

  - id: content-researcher
    primary_domain: marketing
    available_in: [brand, business]
    routing_keywords:
      - market research
      - competitor analysis
      - brand perception
      - trend analysis
    rationale: "Ghost pesquisa mercado para conteúdo (marketing), posicionamento (brand) e estratégia (business)."

  - id: analyst
    primary_domain: software-dev
    available_in: [business, brand]
    routing_keywords:
      - market research
      - brainstorm
      - project brief
      - competitive analysis
      - growth metrics
    rationale: "Atlas faz research e brainstorming que servem business strategy e brand positioning."

# ─────────────────────────────────────────────
# Squad Registry — Chief-First Architecture
# ─────────────────────────────────────────────
# ALL squads are active. No dormant/connected distinction.
# type: enhanced = chief is a core agent (squad_chief in agent file)
# type: standalone = chief is a squad-only agent (skill redirect)
# Graceful degradation: if squad dir doesn't exist on disk, skip silently.

squads:
  # ── Enhanced Squads (chief = core agent) ──
  - id: copy-squad
    path: squads/copy-squad
    type: enhanced
    chief: copywriter
    chief_persona: Mouse
    agents: 22
    skill: "LMAS:agents:copywriter"
    description: "Direct response masters — Halbert, Schwartz, Ogilvy, Sugarman, and 18 more"

  - id: traffic-masters
    path: squads/traffic-masters
    type: enhanced
    chief: traffic-manager
    chief_persona: Merovingian
    agents: 15
    skill: "LMAS:agents:traffic-manager"
