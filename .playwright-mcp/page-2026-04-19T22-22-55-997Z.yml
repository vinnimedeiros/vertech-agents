            - paragraph [ref=e665]: "Amanda responde em menos de 2 minutos, 24 horas por dia. Ela conduz uma conversa consultiva em etapas: entende o perfil do imóvel desejado (tipo, região, dormitórios), qualifica financeiramente (orçamento R$ 400k-1,5M, prazo, finalidade) e identifica sinais de prioridade antes de apresentar opções."
        - generic [ref=e666]:
